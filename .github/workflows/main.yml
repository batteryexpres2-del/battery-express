name: Firebase Hosting Merge
on:
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      # هذه الخطوة هي المفتاح: ستنشئ المجلد وتنقل ملفاتك إليه
      - name: Create dist directory and copy files
        run: |
          mkdir -p dist
          cp -r ./* dist/ || true
          rm -rf dist/.github dist/dist
          
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}'
          projectId: gen-lang-client-0477380058
          channelId: live
